<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelinha do Balacobaco</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #192a6b, #0a1d64);
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

 
        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

      
        nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            background-color: #ff9900;
            padding: 10px;
            border-radius: 8px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            padding: 5px 10px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ffffff;
        }

       
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        th {
            background-color: #ff9500;
            color: rgb(8, 35, 110);
            padding: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            color: #000000;
        }

        tr {
            transition: 0.3s;
        }

      
        tr:hover {
            background-color: #192a6b;
            color: white;
            transform: scale(1.01);
        }

      
        tr:hover td {
            color: white !important;
        }

        td:first-child {
            font-weight: bold;
            color: #192a6b;
        }
    </style>
</head>

<body>

    <div class="container">
        <nav>
            <a href="inicio.html">Inicio</a>
            <a href="cadastro.html">Cadastrar</a>
            <a href="sobre.html">Sobre</a>
            <a href="contato.html">Contato</a>
        </nav>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Quantidade</th>
                    <th>Categoria</th>
                    <th>Preço</th>
                </tr>
            </thead>
            <tbody id="tabela-produtos">

</<tbody id="tabela-produtos">>
        </table>
    </div>
<script>
async function carregarProdutos() {

    const resposta = await fetch("http://127.0.0.1:5000/produtos");
    const produtos = await resposta.json();

    const tabela = document.getElementById("tabela-produtos");
    tabela.innerHTML = "";

    produtos.forEach(produto => {

        tabela.innerHTML += `
            <tr>
                <td>${produto.id}</td>
                <td>${produto.nome}</td>
                <td>${produto.quantidade}</td>
                <td>${produto.categoria}</td>
                <td>R$ ${produto.preco}</td>
            </tr>
        `;
    });
}

carregarProdutos();
</script>
</body>
</html>
