<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Inicial</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1d176d;
        }

        header {
            background-color: #192a6b;
            color: white;
            padding: 40px;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            background-color: #ff9500;
        }

        nav a {
            color: black;
            padding: 14px 20px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            background-color: white;
        }

        .carousel {
            max-width: 900px;
            margin: 30px auto;
        }

        .carousel-item img {
            height: 450px;
            object-fit: contain;
            background-color: white;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #ff9500;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Bem-vindo</h1>
    </header>

    <nav>
        <a href="cadastro.html">Cadastrar item</a>
        <a href="tabela.html">Estoque</a>
        <a href="sobre.html">Sobre nós</a>
        <a href="contato.html">Contato</a>
    </nav>

    <div class="container">

        <div id="meuCarrossel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">


            <div class="carousel-indicators">
                <button type="button" data-bs-target="#meuCarrossel" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#meuCarrossel" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#meuCarrossel" data-bs-slide-to="2"></button>
            </div>

            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="mundo_senai (1).png" class="d-block w-100" alt="Panfleto">
                </div>

                <div class="carousel-item">
                    <img src="senai.png" class="d-block w-100" alt="Senai">
                </div>

                <div class="carousel-item">
                    <img src="curso.jpg" class="d-block w-100" alt="Mundo Senai">
                </div>

            </div>


            <button class="carousel-control-prev" type="button" data-bs-target="#meuCarrossel" data-bs-slide="prev">

                <span class="carousel-control-prev-icon"></span>
            </button>


            <button class="carousel-control-next" type="button" data-bs-target="#meuCarrossel" data-bs-slide="next">

                <span class="carousel-control-next-icon"></span>
            </button>

        </div>

    </div>

    <footer>
        © 2026 - Meu Site
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
